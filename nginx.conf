# ──────────────────────────────────────────────────────────────────────────────
# Chrani Catalog — Nginx Production Configuration
#
# Location: /etc/nginx/sites-available/chranico.com
# Enable:   sudo ln -s /etc/nginx/sites-available/chranico.com \
#                      /etc/nginx/sites-enabled/chranico.com
#           sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   - SSL certificate managed by Certbot (Let's Encrypt):
#       sudo certbot --nginx -d chranico.com -d www.chranico.com
#   - Next.js app running on localhost:3000 via PM2
# ──────────────────────────────────────────────────────────────────────────────

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream chrani_app {
    # Keepalive connections to the Node.js process reduce TCP overhead.
    keepalive 64;
    server 127.0.0.1:3000;
}

# ── HTTP → HTTPS Redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name chranico.com www.chranico.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── WWW → Non-WWW Redirect ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.chranico.com;

    ssl_certificate     /etc/letsencrypt/live/chranico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chranico.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://chranico.com$request_uri;
}

# ── Main HTTPS Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chranico.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/chranico.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chranico.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/chranico.access.log combined buffer=16k flush=5m;
    error_log  /var/log/nginx/chranico.error.log warn;

    # ── Gzip Compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── Brotli (install nginx-module-brotli if available) ─────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json;

    # ── Client limits ─────────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 30s;
    keepalive_timeout    65s;
    send_timeout         30s;

    # ── Security headers (supplementing Next.js middleware) ───────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Static asset caching: Next.js immutable files ─────────────────────────
    location /_next/static/ {
        proxy_pass         http://chrani_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            1y;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # ── Static asset caching: public folder ──────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|webp|avif|svg|ico|woff|woff2|ttf|otf)$ {
        proxy_pass         http://chrani_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        expires            30d;
        add_header         Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
        access_log         off;
    }

    # ── Proxy all other requests to Next.js ───────────────────────────────────
    location / {
        proxy_pass         http://chrani_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;

        # Buffer responses to reduce slow-client impact on Node.js
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Health check endpoint (used by monitoring) ────────────────────────────
    location /api/health {
        proxy_pass         http://chrani_app;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Block common attack vectors ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(bak|sql|git|env|sh|bash)$ {
        deny all;
        return 404;
    }
}
